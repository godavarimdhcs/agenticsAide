name: PR Validation

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 src/ jobs/ pipelines/ tests/ --max-line-length=100 --extend-ignore=E203,W503

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  bundle-validate:
    name: DABS Bundle Validate (dev)
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle (dev)
        run: databricks bundle validate --target dev
